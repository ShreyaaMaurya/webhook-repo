<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Monitor | Live</title>
    <style>
        :root {
            --github-dark: #24292e;
            --push-color: #28a745;
            --pr-color: #007bff;
            --merge-color: #6f42c1;
            --bg-gray: #f6f8fa;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg-gray); 
            padding: 40px 20px; 
            color: #24292e;
            margin: 0;
        }

        .container { 
            max-width: 850px; 
            margin: auto; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2); 
            border: 1px solid #e1e4e8;
            overflow: hidden; 
        }

        .header { 
            padding: 24px; 
            background: var(--github-dark); 
            color: white; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 0.5px; }

        .live-indicator {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            height: 8px; width: 8px;
            background-color: #3fb950;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        #activity-feed { min-height: 200px; }

        .item { 
            padding: 20px 24px; 
            border-bottom: 1px solid #f0f0f0; 
            transition: all 0.2s ease; 
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .item:hover { background: #fcfcfc; transform: translateX(5px); }
        .item:last-child { border-bottom: none; }

        .content-main { flex: 1; }

        .badge {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 10px;
            display: inline-block;
            vertical-align: middle;
        }

        .badge-push { background: #dafbe1; color: var(--push-color); border: 1px solid #bbe5c5; }
        .badge-pr { background: #ddf4ff; color: var(--pr-color); border: 1px solid #b6e0ff; }
        .badge-merge { background: #f5f0ff; color: var(--merge-color); border: 1px solid #d8ccf0; }

        .author { font-weight: 600; color: #1f2328; text-decoration: none; }
        .author:hover { color: var(--pr-color); }

        .branch { 
            font-family: "ui-monospace", "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace; 
            background: #eff3f6; 
            padding: 3px 6px; 
            border-radius: 6px; 
            font-size: 0.85em; 
            color: #444;
            border: 1px solid #d1d5da;
        }

        .time { 
            color: #656d76; 
            font-size: 0.8rem; 
            display: block; 
            margin-top: 10px;
            font-style: italic;
        }

        .no-data { padding: 60px; text-align: center; color: #656d76; font-size: 1.1rem; }
        
        .arrow { color: #999; margin: 0 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GitHub Activity Monitor</h1>
            <div class="live-indicator">
                <span class="dot"></span> LIVE POLLING (15s)
            </div>
        </div>
        <div id="activity-feed">
            <div class="no-data">Initializing connection...</div>
        </div>
    </div>

    <script>
        async function fetchActivity() {
            try {
                const response = await fetch('/api/get-actions');
                const data = await response.json();
                const feed = document.getElementById('activity-feed');
                
                if (data.length === 0) {
                    feed.innerHTML = `
                        <div class="no-data">
                            <p>No activity recorded yet.</p>
                            <small>Waiting for your first Push, Pull Request, or Merge...</small>
                        </div>`;
                    return;
                }

                feed.innerHTML = data.map(item => {
                    let badge = "";
                    let description = "";
                    
                    if (item.action === "PUSH") {
                        badge = `<span class="badge badge-push">Push</span>`;
                        description = `<span class="author">${item.author}</span> pushed to <span class="branch">${item.to_branch}</span>`;
                    } else if (item.action === "PULL_REQUEST") {
                        badge = `<span class="badge badge-pr">Pull Request</span>`;
                        description = `<span class="author">${item.author}</span> sent PR: <span class="branch">${item.from_branch}</span> <span class="arrow">→</span> <span class="branch">${item.to_branch}</span>`;
                    } else if (item.action === "MERGE") {
                        badge = `<span class="badge badge-merge">Merge</span>`;
                        description = `<span class="author">${item.author}</span> merged <span class="branch">${item.from_branch}</span> into <span class="branch">${item.to_branch}</span>`;
                    }

                    return `
                        <div class="item">
                            <div class="content-main">
                                ${badge}
                                <span class="action-text">${description}</span>
                                <span class="time">🕒 ${item.timestamp}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        fetchActivity();
        setInterval(fetchActivity, 15000);
    </script>
</body>
</html>
